services:
  neo-chat:
    build:
      context: .
    image: neo-chat:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-local}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      ACCESS_PASSWORD: ${ACCESS_PASSWORD:-}
      BYOK_PRIVATE_KEY_PEM: ${BYOK_PRIVATE_KEY_PEM:-}
      BYOK_KEY_ID: ${BYOK_KEY_ID:-}
      BYOK_ALLOW_EPHEMERAL_KEY: ${BYOK_ALLOW_EPHEMERAL_KEY:-true}
      ALLOW_LOCAL_NETWORK_PROXY: ${ALLOW_LOCAL_NETWORK_PROXY:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      RATE_LIMIT_STORE: ${RATE_LIMIT_STORE:-memory}
      DOCUMENT_PARSE_JOB_STORE: ${DOCUMENT_PARSE_JOB_STORE:-memory}
      PLUGIN_REGISTRY_STORE: ${PLUGIN_REGISTRY_STORE:-memory}
      MODEL_PROVIDER_STORE: ${MODEL_PROVIDER_STORE:-memory}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
